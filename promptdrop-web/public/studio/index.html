<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PromptDrop</title>

<!-- design system tokens + styles -->
<link rel="stylesheet" href="_ds/ds.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&display=swap">
<!-- prototype styles -->
<link rel="stylesheet" href="app/kit.css">
<link rel="stylesheet" href="app/marketing.css">
<!-- mobile-first layer (bottom tab bar, fluid pages) -->
<link rel="stylesheet" href="mobile.css">

<style>
  html, body { margin: 0; height: 100%; background: #07080b; overflow: hidden; }
  #pd-root { height: 100%; }
  :root { --font-mono: "Geist Mono", ui-monospace, SFMono-Regular, "SF Mono", monospace; }
  [data-theme="dark"] {
    --bg-primary: #0A0B0F; --bg-secondary: #101117; --surface-elevated: #181A22; --surface-raised: #21232C;
    --surface-sunken: #0E0F14; --text-primary: #F7F8FB; --text-secondary: #B7BAC6; --text-muted: #7E8190;
    --border-subtle: rgba(255,255,255,.07); --border-default: #2C2E39; --border-strong: #3D404D; --divider: #23252E;
  }
  .pd-shell { height: 100vh; background: #07080b; color: var(--text-primary); font-family: var(--font-sans); }
  .pd-lockup { display: inline-flex; align-items: center; gap: 11px; cursor: pointer; text-decoration: none; }
  .pd-mark { flex: none; border-radius: 26%; background: #000; border: 1px solid rgba(255,255,255,.16); display: flex; align-items: center; justify-content: center; gap: 0.18em; box-shadow: inset 0 1px 0 rgba(255,255,255,.08), 0 2px 8px rgba(0,0,0,.5); }
  .pd-mark i { width: 0.155em; height: 0.155em; border-radius: 50%; background: #F4F4F5; display: block; }
  .pd-wordmark { font-family: var(--font-sans); font-weight: 800; letter-spacing: -.035em; color: var(--text-primary); line-height: 1; }
  .pd-wordmark span { color: var(--text-muted); }
  .nav__upgrade-eyebrow { font-family: var(--font-mono); font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--accent-primary); margin-bottom: 6px; }
  .navitem--live.navitem--active { background: linear-gradient(120deg, rgba(76,141,255,.22), rgba(139,124,255,.12)); }
  .navitem--live.navitem--active svg { color: var(--accent-primary); }
  .pd-kbd { font-family: var(--font-mono); font-size: 12px; color: var(--text-secondary); background: var(--surface-sunken); border: 1px solid var(--border-default); border-bottom-width: 2px; border-radius: 6px; padding: 3px 9px; }
  .nav__profile .stack { min-width: 0; }
  .nav__profile .nm, .nav__profile .pl { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 150px; }
  /* desktop window: app fills the whole window (no faux Mac chrome) */
  .pd-area { height: 100vh; position: relative; display: flex; overflow: hidden; background: #07080b; }
  .pd-frame--full { width: 100%; height: 100%; }
  .pd-app.app { height: 100% !important; min-width: 0 !important; }
  @media (prefers-reduced-motion: reduce) { * { scroll-behavior: auto; } }
</style>
</head>
<body>
<div id="pd-root"></div>

<!-- vendored React (offline, no CDN) -->
<script src="vendor/react.js"></script>
<script src="vendor/react-dom.js"></script>
<!-- design-system component bundle (PromptDrop, PromptCharacter) -->
<script src="_ds/ds-bundle.js"></script>
<!-- precompiled app (data → icons → shell → screens → live-real → app-boot) -->
<script src="app.bundle.js"></script>
</body>
</html>
