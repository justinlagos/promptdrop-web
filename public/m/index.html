<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
<title>PromptDrop</title>

<link rel="stylesheet" href="_ds/promptdrop-design-system-82c6c3fc-0774-4c89-8b3b-98e1d2bc48e9/tokens/fonts.css" />
<link rel="stylesheet" href="_ds/promptdrop-design-system-82c6c3fc-0774-4c89-8b3b-98e1d2bc48e9/tokens/colors.css" />
<link rel="stylesheet" href="_ds/promptdrop-design-system-82c6c3fc-0774-4c89-8b3b-98e1d2bc48e9/tokens/typography.css" />
<link rel="stylesheet" href="_ds/promptdrop-design-system-82c6c3fc-0774-4c89-8b3b-98e1d2bc48e9/tokens/spacing.css" />
<link rel="stylesheet" href="_ds/promptdrop-design-system-82c6c3fc-0774-4c89-8b3b-98e1d2bc48e9/tokens/radius-shadow.css" />
<link rel="stylesheet" href="_ds/promptdrop-design-system-82c6c3fc-0774-4c89-8b3b-98e1d2bc48e9/tokens/motion.css" />
<link rel="stylesheet" href="_ds/promptdrop-design-system-82c6c3fc-0774-4c89-8b3b-98e1d2bc48e9/tokens/base.css" />
<link rel="stylesheet" href="_ds/promptdrop-design-system-82c6c3fc-0774-4c89-8b3b-98e1d2bc48e9/styles.css" />

<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: var(--bg-primary, #0a0a0b);
    font-family: var(--font-sans);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  #app-root { position: fixed; inset: 0; overflow: hidden; }

  .pd-tap { transition: transform .12s ease, opacity .12s ease, filter .12s ease; -webkit-tap-highlight-color: transparent; }
  .pd-tap:active { transform: scale(0.97); opacity: 0.88; }
  .pd-rec-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--recording); box-shadow: 0 0 8px var(--rec-glow); animation: pd-pulse 1.8s infinite; display: inline-block; }
  @keyframes pd-pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  .pd-wave-bar { width: 4px; height: 14px; border-radius: 9px; background: var(--accent-primary); animation: pd-wave 1.1s ease-in-out infinite; }
  @keyframes pd-wave { 0%,100% { height: 10px; opacity: 0.5; } 50% { height: 46px; opacity: 1; } }
  .pd-scroll::-webkit-scrollbar, .pd-hscroll::-webkit-scrollbar { display: none; }
  .pd-scroll, .pd-hscroll { scrollbar-width: none; -ms-overflow-style: none; }
  .pd-push { animation: pd-slide-in .3s cubic-bezier(.22,1,.36,1); }
  @keyframes pd-slide-in { from { transform: translateY(16px); } to { transform: translateY(0); } }
  ::placeholder { color: var(--text-muted); opacity: 1; }
  button { font-family: var(--font-sans); }
  @media (prefers-reduced-motion: reduce) { .pd-push, .pd-rec-dot, .pd-wave-bar { animation: none !important; } }
</style>
</head>
<body>
  <div id="app-root">
    <div id="pd-boot" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;color:#7E8190;font:14px system-ui">Loading PromptDrop…</div>
  </div>
  <script>
    // If the app hasn't mounted shortly after load, the scripts failed (often a blocked CDN). Say so, don't sit black.
    window.addEventListener('error', function (e) {
      var r = document.getElementById('app-root');
      if (r && !r.getAttribute('data-mounted')) {
        r.innerHTML = '<div style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:24px;color:#cfd2da;font:14px system-ui;text-align:center">Could not load the app.<br><small style="opacity:.6">' + ((e && e.message) || 'A script failed to load') + '</small></div>';
      }
    }, true);
    setTimeout(function () {
      var r = document.getElementById('app-root');
      if (r && !r.getAttribute('data-mounted')) {
        r.innerHTML = '<div style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;color:#cfd2da;font:14px system-ui;text-align:center">Still loading…<br><small style="opacity:.6;margin:6px 0 14px">If this stays, your connection may be blocking a resource.</small><button onclick="location.reload()" style="padding:8px 16px;border-radius:10px;border:1px solid #333;background:#1a1a1f;color:#fff;font-size:13px">Reload</button></div>';
      }
    }, 6000);
  </script>

  <!-- Vendored locally so a blocked or slow CDN can never blank the app -->
  <script src="_vendor/react.min.js"></script>
  <script src="_vendor/react-dom.min.js"></script>
  <script src="_vendor/supabase.min.js"></script>

  <script src="_ds/promptdrop-design-system-82c6c3fc-0774-4c89-8b3b-98e1d2bc48e9/_ds_bundle.js"></script>

  <!-- Precompiled app (ios-frame -> data -> screens -> app), no runtime Babel -->
  <script src="app.bundle.js"></script>
</body>
</html>
